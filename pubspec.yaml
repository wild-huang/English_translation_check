name: trans_flutter
description: "翻译检查 - 上海高考英语中译英检查工具"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 状态管理
  get: ^4.6.6
  
  # 本地存储
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.1.0
  
  # HTTP请求
  dio: ^5.9.1
  
  # UI组件
  flex_seed_scheme: ^4.0.1
  material_design_icons_flutter: ^7.0.7296
  
  # 工具
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  collection: ^1.19.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.3
  hive_ce_generator: ^1.8.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
